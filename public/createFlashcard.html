<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./js/main.js"></script>
    <script src="./js/createFlashcard.js" defer></script>
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/header.css" />
    <link rel="stylesheet" href="./styles/footer.css" />
    <link rel="stylesheet" href="./styles/createFlashcard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <title>Document</title>
  </head>
  <body>
    <header id="headerContainer"></header>
    <main>
      <div class="container">
        <h2>Skapa Flashcard</h2>
        <div>
          <label class="label" for="categories">Välj en kategori</label>
          <select class="select" name="categories" id="categories">
            <option value="history">History</option>
            <option value="mathematics">Mathematics</option>
            <option value="geography">Geography</option>
            <option value="psychology">Psychology</option>
            <option value="biology">Biology</option>
            <option value="chemistry">Chemistry</option>
            <option value="uxd">UXD</option>
            <option value="physics">Physics</option>
          </select>
        </div>
        <div class="">
          <input
            class="checkbox"
            type="checkbox"
            id="public"
            name="public"
            value="Public"
          />
          <label class="" for="public"> Publicera public</label>
        </div>
        <div class="flashcard">
          <button class="accordion flex-row">
            <div class="flex-row">
              <label class="" for="flashcardQuestion"><span class='unicode'>&#x2335</span> Flashcard 1</label>
            </div>
            <div class="flex-row edit-delete-icons-div">
              <img class="edit-delete-icons" src="./img/edit.svg" />
              <img class="edit-delete-icons" src="./img/delete.svg" />
            </div>
          </button>
          <div class="panel">
            <textarea
              class="textarea"
              name="flashcardQuestion"
              id="flashcard-question"
              placeholder="Fråga"
            ></textarea>
            <textarea
              class="textarea"
              name="flashcardAnswer"
              id="flashcard-answer"
              placeholder="Svar"
            ></textarea>
          </div>
        </div>
        <div class="add-button">
          <img class="add-icon" src="./img/add.svg" /><a class="add-text" href="flashcard.html"
            > Lägg till ett nytt
            kort</a
          >
          </div>
        <a class="button" href="flashcard.html"
          >Slutför och skapa samling</a
        >
      </div>
    </main>
    <footer id="footerContainer"></footer>
  </body>
</html>
